# CodeQL Advanced Security Analysis
# 
# Automated security vulnerability scanning and code quality analysis
# for GAIA (Geospatial AI-driven Assessment) project.
#
# Features:
# - Multi-language analysis (Python, JavaScript/TypeScript, GitHub Actions)
# - Pre-validation syntax checks (Python, YAML)
# - Security-extended query suite
# - Automated dependency scanning
# - Weekly scheduled scans
#
# Maintainer: DevOps Team
# Last Updated: 2026-03-26
#
name: "CodeQL Advanced Security Analysis"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main", "develop", "production" ]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - '.github/workflows/**'
  schedule:
    # Run weekly security scan on Sundays at 22:26 UTC
    - cron: '26 22 * * 0'
  workflow_dispatch:
    inputs:
      enable_debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

env:
  # Global environment variables
  CODEQL_ENABLE_DEBUG: ${{ github.event.inputs.enable_debug || 'false' }}

jobs:
  analyze:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      # Required for CodeQL security events
      security-events: write
      # Required for CodeQL package access
      packages: read
      # Required for repository access
      actions: read
      contents: read
      # Required for pull request comments
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none
          query-suite: security-extended
        - language: javascript-typescript
          build-mode: none
          query-suite: security-extended
        - language: actions
          build-mode: none
          query-suite: security-and-quality
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    # ========================================
    # Pre-Validation Steps
    # ========================================
    
    - name: Setup Python environment
      if: matrix.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Validate Python syntax
      if: matrix.language == 'python'
      run: |
        set -o pipefail
        echo "========================================="
        echo "Python Syntax Validation"
        echo "========================================="
        
        python_files_array=()
        while IFS= read -r -d '' file; do
          python_files_array+=("$file")
        done < <(find backend frontend -name "*.py" -print0 2>/dev/null || true)
        
        if [ ${#python_files_array[@]} -eq 0 ]; then
          echo "[INFO] No Python files found to validate"
          exit 0
        fi
        
        echo "[INFO] Found ${#python_files_array[@]} Python files"
        echo ""
        
        failed=0
        passed=0
        
        for file in "${python_files_array[@]}"; do
          echo "[CHECK] $file"
          # Capture both stdout and stderr to show full error details
          if error_output=$(python -m py_compile "$file" 2>&1); then
            echo "[PASS] $file"
            passed=$((passed+1))
          else
            echo "[FAIL] SYNTAX ERROR: $file"
            echo "Error details:"
            echo "$error_output"
            failed=$((failed+1))
          fi
          echo "----------------------------------------"
        done
        
        echo "========================================="
        echo "Validation Summary"
        echo "========================================="
        echo "Passed: $passed files"
        echo "Failed: $failed files"
        
        if [ $failed -gt 0 ]; then
          echo "[ERROR] Python syntax validation failed!"
          exit 1
        fi

    - name: Setup Node.js environment
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    # Using Node.js 20 LTS with synchronized package-lock.json (includes yaml@2.8.3)
    - name: Install frontend dependencies
      if: matrix.language == 'javascript-typescript'
      working-directory: frontend
      run: npm ci --prefer-offline --no-audit

    - name: Validate TypeScript/JavaScript syntax
      if: matrix.language == 'javascript-typescript'
      working-directory: frontend
      run: |
        echo "========================================="
        echo "TypeScript/JavaScript Validation"
        echo "========================================="
        
        # Run ESLint for syntax and quality checks
        if npm run lint -- --max-warnings=0; then
          echo "[SUCCESS] All JavaScript/TypeScript files validated"
        else
          echo "[WARNING] Linting issues detected (non-blocking)"
        fi

    - name: Validate GitHub Actions workflows
      if: matrix.language == 'actions'
      run: |
        echo "========================================="
        echo "GitHub Actions Workflow Validation"
        echo "========================================="
        
        python -m pip install pyyaml --quiet
        python - <<'PYTHON_SCRIPT'
        import sys, glob, yaml
        from pathlib import Path
        
        workflow_files = glob.glob('.github/workflows/*.yml') + glob.glob('.github/workflows/*.yaml')
        
        if not workflow_files:
            print("[INFO] No workflow YAML files found")
            sys.exit(0)
        
        print(f"[INFO] Found {len(workflow_files)} workflow files")
        print("")
        
        failed = []
        passed = []
        
        for workflow_path in workflow_files:
            try:
                with open(workflow_path, 'r', encoding='utf-8') as f:
                    yaml.safe_load(f)
                print(f"[PASS] {workflow_path}")
                passed.append(workflow_path)
            except Exception as error:
                print(f"[FAIL] {workflow_path}")
                print(f"  Error: {error}")
                failed.append(workflow_path)
        
        print("")
        print("=========================================")
        print("Validation Summary")
        print("=========================================")
        print(f"Passed: {len(passed)} workflows")
        print(f"Failed: {len(failed)} workflows")
        
        if failed:
            print("")
            print("[ERROR] Workflow YAML validation failed!")
            print("Fix YAML syntax errors before proceeding.")
            sys.exit(1)
        
        print("")
        print("[SUCCESS] All workflows validated successfully")
        PYTHON_SCRIPT

    # ========================================
    # CodeQL Analysis
    # ========================================

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: ${{ matrix.query-suite }}
        # Enable additional security checks
        config: |
          paths-ignore:
            - '**/node_modules'
            - '**/dist'
            - '**/build'
            - '**/__pycache__'
            - '**/venv'
            - '**/.venv'

    - name: Perform CodeQL Analysis
      id: codeql-analyze
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
        upload: true
        output: sarif-results
        
    - name: Upload SARIF results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-results-${{ matrix.language }}
        path: sarif-results
        retention-days: 30

    # ========================================
    # Post-Analysis Reporting
    # ========================================

    - name: Generate analysis summary
      if: always()
      run: |
        echo "### CodeQL Analysis Complete: ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Analysis Details:**" >> $GITHUB_STEP_SUMMARY
        echo "- Language: \`${{ matrix.language }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Query Suite: \`${{ matrix.query-suite }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Build Mode: \`${{ matrix.build-mode }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Runner: \`${{ runner.os }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Determine status based on job outcome
        case "${{ job.status }}" in
          success)
            echo "**Status:** :white_check_mark: Analysis completed successfully" >> $GITHUB_STEP_SUMMARY
            ;;
          failure)
            echo "**Status:** :x: Analysis failed" >> $GITHUB_STEP_SUMMARY
            ;;
          cancelled)
            echo "**Status:** :warning: Analysis cancelled" >> $GITHUB_STEP_SUMMARY
            ;;
          *)
            echo "**Status:** :question: Analysis status unknown" >> $GITHUB_STEP_SUMMARY
            ;;
        esac
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "View detailed results in the **Security** tab under **Code scanning alerts**" >> $GITHUB_STEP_SUMMARY
